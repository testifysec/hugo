name: secure-release

# Keyless, platform-signed attested build of the hugo binary on an isolated,
# GitHub-hosted runner. cilock-action mints a fresh OIDC token, gets a
# short-lived Fulcio cert, signs the in-toto attestation, and stores it in
# Archivista. The signing material is never exposed to the build steps — the
# isolated-builder property that earns SLSA Build L2/L3.
#
# Minimal config: everything except `attestations` derives from defaults.
# platform-url, keyless Fulcio, and Archivista storage are all on by default;
# the one non-obvious requirement is `id-token: write`.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'supply-chain/runbook/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write          # required: ambient OIDC -> platform Fulcio (keyless)

jobs:
  attested-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.26'
          cache: true

      - name: Attested build (keyless, platform-signed)
        uses: aflock-ai/cilock-action@d39bb9b17e392520f9e7eef17cf355c027a5c283  # v1
        with:
          step: build
          command: go build -trimpath -o dist/hugo .
          attestations: environment git github slsa
          outfile: build.attestation.json

      - name: Install cilock (pinned + checksum-verified, no curl|bash)
        run: |
          cd "$RUNNER_TEMP"
          curl -fsSLO https://cilock.dev/dl/v3.0.0/cilock-3.0.0-linux-amd64.tar.gz
          echo "e228589d03af001b8bfe91535f382a8f2ec611726f21552973c6c4086a63dd3e  cilock-3.0.0-linux-amd64.tar.gz" | sha256sum -c -
          tar -xzf cilock-3.0.0-linux-amd64.tar.gz
          sudo install -m0755 cilock /usr/local/bin/cilock
          cilock version

      - name: Verify provenance gate (binary must be an attested product of THIS workflow)
        run: |
          cilock verify dist/hugo \
            --policy       supply-chain/gates/hugo-build.policy.signed.json \
            --publickey    supply-chain/keys/release.pub \
            --attestations build.attestation.json \
            --platform-url ""
